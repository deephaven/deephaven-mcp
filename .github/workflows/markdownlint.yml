name: markdownlint (Markdown Linter)

on:
  push:
    branches: [main, mcp2]
  pull_request:
    branches: [main, mcp2]

jobs:
  markdownlint-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run markdownlint
        run: npx --yes markdownlint-cli2
