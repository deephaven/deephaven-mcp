name: mypy

on:
  push:
    branches: [ "main", "mcp2" ]
  pull_request:
    branches: [ "main", "mcp2" ]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra lint --extra enterprise

      - name: Run mypy
        run: uv run mypy src --exclude _version.py --exclude .venv
